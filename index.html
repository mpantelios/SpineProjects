    }

    body {

      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    aside {
      width: 280px;
      background: #1b1b1b;
      border-right: 1px solid #333;
      padding: 20px;
      overflow-y: auto;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .toc-button {
      width: 100%;
      display: block;
      padding: 12px 14px;
      margin-bottom: 10px;
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #444;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
    }

    .toc-button:hover {
      background: #353535;
    }

    .toc-button.active {
      background: #4a4a4a;
      border-color: #777;
    }

    .footer-note {

        margin-top: 30px;

        padding-top: 20px;

        border-top: 1px solid #333;

        font-size: 12px;

        color: #888;

        line-height: 1.5;

    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    header {
      height: 65px;
      padding: 14px 20px;
      background: #181818;
      border-bottom: 1px solid #333;
      font-size: 15px;
      color: #ddd;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #000;
    }
  </style>
</head>

    const toc = document.getElementById("toc");
    const viewer = document.getElementById("viewer");
    const projectTitle = document.getElementById("projectTitle");

    function loadProject(project, button) {
      viewer.src = project.path;
      projectTitle.textContent = project.title;

      document
        .querySelectorAll(".toc-button")
        .forEach(btn => btn.classList.remove("active"));

      button.classList.add("active");
    }

    projects.forEach((project, index) => {
      const button = document.createElement("button");
      button.className = "toc-button";
      button.textContent = project.title;

      button.addEventListener("click", () => {
        loadProject(project, button);
      });

      toc.appendChild(button);

      if (index === 0) {
        loadProject(project, button);
      }
    });
